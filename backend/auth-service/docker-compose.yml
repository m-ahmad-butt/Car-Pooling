services:
  auth-service:
    build: .
    ports:
      - "5002:5002"
    environment:
      - DATABASE_URL=mongodb://admin:admin123@auth-mongo:27017/auth_db?authSource=admin&directConnection=true&replicaSet=rs0
      - AUTH_SERVICE_PORT=5002
      - EUREKA_URL=http://eureka-server:5001
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
    depends_on:
      mongo-init-replica:
        condition: service_completed_successfully
    networks:
      - carpooling-network

  auth-mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=admin123
    volumes:
      - auth_mongo_data:/data/db
    command: ["--replSet", "rs0"]
    networks:
      - carpooling-network

  mongo-init-replica:
    image: mongo:latest
    depends_on:
      - auth-mongo
    networks:
      - carpooling-network
    entrypoint: >
      bash -c "
        sleep 5 &&
        mongosh --host auth-mongo:27017 -u admin -p admin123 --authenticationDatabase admin --eval '
          try { rs.status() } catch(e) { rs.initiate({_id: \"rs0\", members: [{_id: 0, host: \"auth-mongo:27017\"}]}) }
        '
      "

  mongo-express:
    image: mongo-express:latest
    container_name: auth-mongo-express
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_ADMINUSERNAME=admin
      - ME_CONFIG_MONGODB_ADMINPASSWORD=admin123
      - ME_CONFIG_MONGODB_URL=mongodb://admin:admin123@auth-mongo:27017/?replicaSet=rs0&directConnection=true
      - ME_CONFIG_BASICAUTH=false
    depends_on:
      mongo-init-replica:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - carpooling-network

networks:
  carpooling-network:
    external: true

volumes:
  auth_mongo_data:

