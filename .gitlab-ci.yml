stages:
  - build
  - deploy

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""

services:
  - name: docker:24.0.5-dind
    alias: docker

.docker-login: &docker-login
  before_script:
    - echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin

# --- BUILD JOBS ---
build-eureka:
  <<: *docker-login
  stage: build
  image: docker:24.0.5
  script:
    - docker build -t $DOCKER_USERNAME/fspm-netflix-eureka-server:latest ./backend/netflix-eureka-server
    - docker push $DOCKER_USERNAME/fspm-netflix-eureka-server:latest
  only:
    - main
    - develop

build-gateway:
  <<: *docker-login
  stage: build
  image: docker:24.0.5
  script:
    - docker build -t $DOCKER_USERNAME/fspm-api-gateway:latest ./backend/api-gateway
    - docker push $DOCKER_USERNAME/fspm-api-gateway:latest
  only:
    - main
    - develop

build-auth:
  <<: *docker-login
  stage: build
  image: docker:24.0.5
  script:
    - docker build -t $DOCKER_USERNAME/fspm-auth-service:latest ./backend/auth-service
    - docker push $DOCKER_USERNAME/fspm-auth-service:latest
  only:
    - main
    - develop

build-frontend:
  <<: *docker-login
  stage: build
  image: docker:24.0.5
  script:
    - docker build --build-arg VITE_CLERK_PUBLISHABLE_KEY=$CLERK_PUBLISHABLE_KEY --build-arg VITE_API_URL=$API_SERVICE_URL -t $DOCKER_USERNAME/fspm-frontend:latest ./frontend
    - docker push $DOCKER_USERNAME/fspm-frontend:latest
  only:
    - main
    - develop

# --- DEPLOY JOBS ---
deploy-eureka:
  stage: deploy
  image: alpine:latest
  script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh -o StrictHostKeyChecking=no ubuntu@$EC2_EUREKA_IP "docker image prune -f && docker pull $DOCKER_USERNAME/fspm-netflix-eureka-server:latest && docker rm -f eureka || true && docker run -d --name eureka -p 5001:5001 -e EUREKA_SERVER_PORT=5001 $DOCKER_USERNAME/fspm-netflix-eureka-server:latest"
  only:
    - main

deploy-gateway:
  stage: deploy
  image: alpine:latest
  script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh -o StrictHostKeyChecking=no ubuntu@$EC2_GATEWAY_IP "docker image prune -f && docker pull $DOCKER_USERNAME/fspm-api-gateway:latest && docker rm -f gateway || true && docker run -d --name gateway -p 5000:5000 -e API_GATEWAY_PORT=5000 -e EUREKA_URL=http://$EC2_EUREKA_IP:5001 -e AUTH_SERVICE_URL=http://$EC2_AUTH_IP:5002 -e CLIENT_URL='$CLIENT_PROD_URL' $DOCKER_USERNAME/fspm-api-gateway:latest"
  only:
    - main


deploy-auth:
  stage: deploy
  image: alpine:latest
  script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh -o StrictHostKeyChecking=no ubuntu@$EC2_AUTH_IP "docker rm -f auth auth-db mongo-express 2>/dev/null || true && docker volume rm auth_mongo_data 2>/dev/null || true && docker image prune -f"
    - ssh -o StrictHostKeyChecking=no ubuntu@$EC2_AUTH_IP "docker pull mongo:latest && docker run -d --name auth-db -p 27017:27017 -e MONGO_INITDB_ROOT_USERNAME=admin -e MONGO_INITDB_ROOT_PASSWORD=admin123 -v auth_mongo_data:/data/db mongo:latest --replSet rs0"
    - echo "Waiting for MongoDB to start..." && sleep 15
    - ssh -o StrictHostKeyChecking=no ubuntu@$EC2_AUTH_IP "docker logs auth-db --tail 20"
    - ssh -o StrictHostKeyChecking=no ubuntu@$EC2_AUTH_IP "docker exec auth-db mongosh -u admin -p admin123 --authenticationDatabase admin --eval 'rs.initiate({_id:\"rs0\",members:[{_id:0,host:\"localhost:27017\"}]})' || echo 'Replica set may already be initialized'"
    - echo "Waiting for replica set primary..." && sleep 5
    - ssh -o StrictHostKeyChecking=no ubuntu@$EC2_AUTH_IP "docker pull mongo-express:latest && docker run -d --name mongo-express -p 8081:8081 --link auth-db:mongo -e ME_CONFIG_MONGODB_ADMINUSERNAME=admin -e ME_CONFIG_MONGODB_ADMINPASSWORD=admin123 -e ME_CONFIG_MONGODB_URL='mongodb://admin:admin123@mongo:27017/?replicaSet=rs0' -e ME_CONFIG_BASICAUTH=false mongo-express:latest"
    - ssh -o StrictHostKeyChecking=no ubuntu@$EC2_AUTH_IP "docker pull $DOCKER_USERNAME/fspm-auth-service:latest && docker run -d --name auth -p 5002:5002 --link auth-db:mongodb -e CLERK_SECRET_KEY=$CLERK_SECRET_KEY -e DATABASE_URL='mongodb://admin:admin123@mongodb:27017/auth_db?authSource=admin&replicaSet=rs0' -e EUREKA_URL=http://$EC2_EUREKA_IP:5001 $DOCKER_USERNAME/fspm-auth-service:latest"
    - sleep 5
    - ssh -o StrictHostKeyChecking=no ubuntu@$EC2_AUTH_IP "docker exec auth npx prisma db push"
  only:
    - main

deploy-frontend:
  stage: deploy
  image: alpine:latest
  script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh -o StrictHostKeyChecking=no ubuntu@$EC2_FRONTEND_IP "docker image prune -f && docker pull $DOCKER_USERNAME/fspm-frontend:latest && docker rm -f frontend || true && docker run -d --name frontend -p 3000:80 $DOCKER_USERNAME/fspm-frontend:latest"
  only:
    - main
