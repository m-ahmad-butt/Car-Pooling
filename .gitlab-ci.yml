stages:
  - build
  - deploy

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""

services:
  - name: docker:24.0.5-dind
    alias: docker

before_script:
  - echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin

# --- BUILD JOBS ---
build-eureka:
  stage: build
  image: docker:24.0.5
  script:
    - docker build -t $DOCKER_USERNAME/fspm-netflix-eureka-server:latest ./backend/netflix-eureka-server
    - docker push $DOCKER_USERNAME/fspm-netflix-eureka-server:latest
  only:
    - main
    - develop

build-gateway:
  stage: build
  image: docker:24.0.5
  script:
    - docker build -t $DOCKER_USERNAME/fspm-api-gateway:latest ./backend/api-gateway
    - docker push $DOCKER_USERNAME/fspm-api-gateway:latest
  only:
    - main
    - develop

build-auth:
  stage: build
  image: docker:24.0.5
  script:
    - docker build -t $DOCKER_USERNAME/fspm-auth-service:latest ./backend/auth-service
    - docker push $DOCKER_USERNAME/fspm-auth-service:latest
  only:
    - main
    - develop

build-frontend:
  stage: build
  image: docker:24.0.5
  script:
    - docker build --build-arg VITE_CLERK_PUBLISHABLE_KEY=$CLERK_PUBLISHABLE_KEY --build-arg VITE_API_URL=http://$EC2_GATEWAY_IP:5000 -t $DOCKER_USERNAME/fspm-frontend:latest ./frontend
    - docker push $DOCKER_USERNAME/fspm-frontend:latest
  only:
    - main
    - develop

# --- DEPLOY JOBS (PRODUCTION) ---
deploy-eureka:
  stage: deploy
  image: alpine:latest
  script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh -o StrictHostKeyChecking=no ubuntu@$EC2_EUREKA_IP "
        docker pull $DOCKER_USERNAME/fspm-netflix-eureka-server:latest && 
        docker stop eureka || true && 
        docker rm eureka || true && 
        docker run -d --name eureka \
        -p 5001:5001 \
        -e EUREKA_SERVER_PORT=5001 \
        $DOCKER_USERNAME/fspm-netflix-eureka-server:latest"
  only:
    - main

deploy-gateway:
  stage: deploy
  image: alpine:latest
  script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh -o StrictHostKeyChecking=no ubuntu@$EC2_GATEWAY_IP "
        docker pull $DOCKER_USERNAME/fspm-api-gateway:latest && 
        docker stop gateway || true && 
        docker rm gateway || true && 
        docker run -d --name gateway \
        -p 5000:5000 \
        -e API_GATEWAY_PORT=5000 \
        -e EUREKA_URL=http://$EC2_EUREKA_IP:5001 \
        -e AUTH_SERVICE_URL=http://$EC2_AUTH_IP:5002 \
        -e CLIENT_URL=$CLIENT_PROD_URL \
        $DOCKER_USERNAME/fspm-api-gateway:latest"
  only:
    - main

deploy-auth:
  stage: deploy
  image: alpine:latest
  script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh -o StrictHostKeyChecking=no ubuntu@$EC2_AUTH_IP "
        docker pull mongo:latest &&
        docker stop auth-db || true && docker rm auth-db || true &&
        docker run -d --name auth-db \
          -p 27017:27017 \
          -e MONGO_INITDB_ROOT_USERNAME=admin \
          -e MONGO_INITDB_ROOT_PASSWORD=admin123 \
          mongo:latest &&
        docker stop mongo-express || true && docker rm mongo-express || true &&
        docker run -d --name mongo-express \
          -p 8081:8081 \
          --link auth-db:mongo \
          -e ME_CONFIG_MONGODB_ADMINUSERNAME=admin \
          -e ME_CONFIG_MONGODB_ADMINPASSWORD=admin123 \
          -e ME_CONFIG_MONGODB_URL=mongodb://admin:admin123@mongo:27017/ \
          -e ME_CONFIG_BASICAUTH=false \
          mongo-express:latest &&
        docker pull $DOCKER_USERNAME/fspm-auth-service:latest && 
        docker stop auth || true && 
        docker rm auth || true && 
        docker run -d --name auth \
          -p 5002:5002 \
          --link auth-db:mongodb \
          -e CLERK_SECRET_KEY=$CLERK_SECRET_KEY \
          -e DATABASE_URL=mongodb://admin:admin123@mongodb:27017/auth_db?authSource=admin \
          -e EUREKA_URL=http://$EC2_EUREKA_IP:5001 \
          $DOCKER_USERNAME/fspm-auth-service:latest"
  only:
    - main

deploy-frontend:
  stage: deploy
  image: alpine:latest
  script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh -o StrictHostKeyChecking=no ubuntu@$EC2_FRONTEND_IP "
        docker pull $DOCKER_USERNAME/fspm-frontend:latest && 
        docker stop frontend || true && 
        docker rm frontend || true && 
        docker run -d --name frontend \
          -p 3000:80 \
          $DOCKER_USERNAME/fspm-frontend:latest"
  only:
    - main
